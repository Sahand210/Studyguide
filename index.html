<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Study Journey</title>
  
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f5f7fa;
      color: #333;
      margin: 0;
      padding: 20px;
      padding-bottom: 40px;
    }
    
    .header-card {
      background: linear-gradient(135deg, #6e8efb, #a777e3);
      color: white;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 25px;
      box-shadow: 0 4px 15px rgba(110, 142, 251, 0.3);
    }

    .header-card h1 {
      margin: 0 0 5px 0;
      font-size: 24px;
    }

    .header-card p {
      margin: 0;
      font-size: 14px;
      opacity: 0.9;
    }

    .section-title {
      background-color: #FFF9E6;
      color: #B8860B;
      padding: 8px 16px;
      border-radius: 20px;
      display: inline-block;
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 15px;
      letter-spacing: 0.5px;
    }

    .subject-card {
      background: #ffffff;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.03);
      display: flex;
      align-items: flex-start;
      gap: 15px;
    }

    .icon-circle {
      background: #F0F4F8;
      min-width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .subject-info h3 {
      margin: 0 0 5px 0;
      font-size: 18px;
      color: #2c3e50;
    }

    .subject-info p {
      margin: 0 0 4px 0;
      font-size: 13px;
      color: #666;
    }

    .btn-done {
      background: #E8F0FE;
      color: #1A73E8;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 13px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }

    .btn-done:active {
      background: #d2e3fc;
    }

    .progress-section {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin-top: 30px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.03);
    }
  </style>
</head>
<body>

  <div class="header-card">
    <h1>Study Journey 📚</h1>
    <p>March 27 - Jul 2 (98 days total)</p>
  </div>

  <div class="section-title">
    📌 PHASE 2 — REVIEW (IN ORDER)
  </div>

  <div id="phase2-container"></div>

  <div class="progress-section">
    <h3 style="margin: 0 0 10px 0; font-size: 16px;">Journey Progress</h3>
    <div style="background: #e0e0e0; border-radius: 10px; height: 12px; width: 100%; overflow: hidden;">
      <div style="background: linear-gradient(90deg, #4CAF50, #8BC34A); width: 25%; height: 100%; border-radius: 10px;"></div>
    </div>
    <p style="text-align: right; font-size: 12px; color: #888; margin: 5px 0 0 0;">Phase 1 complete</p>
  </div>

  <script>
    // The completely fixed array with correct days, dates, and messages
    const phase2Subjects = [
      {
        name: "Math",
        icon: "📐",
        examDate: "18 Jun",
        planned: "2 Apr → 12 Apr",
        daysCount: 11,
        completionTitle: "Math is done! 🎉",
        quranVerse: "“And that there is not for man except that [good] for which he strives.”\n(Surah An-Najm 53:39)",
        medSchoolMessage: "Every complex equation you just solved brings you one step closer to your white coat. Med school is waiting for you, habibi!"
      },
      {
        name: "English",
        icon: "🔤",
        examDate: "28 Jun",
        planned: "13 Apr → 17 Apr",
        daysCount: 5,
        completionTitle: "English is complete! 🌟",
        quranVerse: "“Indeed, with hardship [will be] ease.”\n(Surah Ash-Sharh 94:6)",
        medSchoolMessage: "You pushed through the hardship! The ease and joy of walking through the doors of medical school will soon be your reality. Keep going, future doctor!"
      },
      {
        name: "Chemistry",
        icon: "⚗️",
        examDate: "25 Jun",
        planned: "18 Apr → 27 Apr",
        daysCount: 10,
        completionTitle: "Chemistry conquered! 🧪",
        quranVerse: "“And He found you lost and guided [you].”\n(Surah Ad-Duhaa 93:7)",
        medSchoolMessage: "The formulas might have been heavy, but your path to medicine is clear and guided. You are building the exact discipline a brilliant doctor needs!"
      },
      {
        name: "Arabic",
        icon: "✍️",
        examDate: "21 Jun",
        planned: "28 Apr → 2 May",
        daysCount: 5,
        completionTitle: "Arabic is finished! 📖",
        quranVerse: "“My Lord, increase me in knowledge.”\n(Surah Taha 20:114)",
        medSchoolMessage: "Your pursuit of knowledge is so blessed. Soon, all this incredible dedication will be used to heal patients in med school!"
      },
      {
        name: "Physics",
        icon: "🔭",
        examDate: "2 Jul",
        planned: "3 May → 13 May",
        daysCount: 11,
        completionTitle: "Physics is out of the way! ⚡",
        quranVerse: "“Allah does not burden a soul beyond that it can bear.”\n(Surah Al-Baqarah 2:286)",
        medSchoolMessage: "You handled the pressure beautifully. If you can conquer this, the late nights in med school will be a breeze for you. I'm so proud of you!"
      },
      {
        name: "Kurdish",
        icon: "🌸",
        examDate: "14 Jun",
        planned: "14 May → 18 May",
        daysCount: 5,
        completionTitle: "Kurdish is done! 📚",
        quranVerse: "“So be patient with gracious patience.”\n(Surah Al-Ma'arij 70:5)",
        medSchoolMessage: "Your beautiful patience is paying off. You are in the final stretch now. Take a deep breath—med school is almost in your grasp!"
      },
      {
        name: "Biology",
        icon: "🧬",
        examDate: "11 Jun",
        planned: "19 May → 1 Jun",
        daysCount: 14,
        completionTitle: "Phase 2 is Complete! 🩺💛",
        quranVerse: "“And whoever saves one - it is as if he had saved mankind entirely.”\n(Surah Al-Ma'idah 5:32)",
        medSchoolMessage: "You are studying the creation of Allah to one day save lives. The review is done, your foundation is set. You are going to be an incredible doctor!"
      }
    ];

    function renderPhase2() {
      const container = document.getElementById("phase2-container");
      let htmlContent = "";

      phase2Subjects.forEach((subject, index) => {
        htmlContent += `
          <div class="subject-card">
            <div class="icon-circle">${subject.icon}</div>
            <div class="subject-info">
              <h3>${subject.name}</h3>
              <p><strong>Exam:</strong> ${subject.examDate}</p>
              <p><strong>Review:</strong> ${subject.planned} (${subject.daysCount} days)</p>
              <button class="btn-done" onclick="finishSubject(${index})">Tap when finished ✨</button>
            </div>
          </div>
        `;
      });

      container.innerHTML = htmlContent;
    }

    function finishSubject(index) {
      const subject = phase2Subjects[index];
      
      // Beautiful SweetAlert pop-up instead of standard browser alert
      Swal.fire({
        title: subject.completionTitle,
        html: `
          <div style="font-size: 15px; color: #555; line-height: 1.6; margin-top: 10px;">
            <p style="font-style: italic; color: #2c3e50; font-weight: 500;">${subject.quranVerse}</p>
            <hr style="border: 0; height: 1px; background: #eee; margin: 15px 0;">
            <p>${subject.medSchoolMessage}</p>
          </div>
        `,
        icon: 'success',
        confirmButtonText: 'Alhamdulillah 🤍',
        confirmButtonColor: '#6e8efb',
        backdrop: `rgba(0,0,0,0.4)`
      });
    }

    // Load everything when page opens
    window.onload = function() {
      renderPhase2();
    };
  </script>
</body>
</html>
